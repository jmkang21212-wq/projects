<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SSAFY Bank - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="style.css">
  <style>
    /* 홈 화면 전용 레이아웃 스타일 */
    .account-item {
      padding: 1rem 0;
      border-bottom: 1px solid var(--bg-light-gray);
      transition: background-color 0.2s;
      cursor: pointer;
    }
    .account-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }
    .account-item:hover { 
      background-color: #f9fafb; 
      border-radius: 12px; 
      padding-left: 0.5rem; 
      padding-right: 0.5rem;
    }
    
    /* 서브 액션 버튼 스타일 */
    .action-btn {
      background-color: #f2f4f6;
      color: #4e5968;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .action-btn:hover { background-color: #e5e8eb; }

    /* 은행 로고 아이콘 박스 (Report 페이지와 통일성 유지) */
    .icon-box {
      width: 44px; height: 44px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      background-color: #f2f4f6; font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark navbar-expand-lg bg-toss px-4 shadow-sm">
    <div class="container-fluid max-w-75">
      <a class="navbar-brand fw-bold" href="ai_index.html">SSAFY Bank</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link active fw-bold" href="ai_index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="ai_fin_portfolio.html">Portfolio</a></li>
          <li class="nav-item"><a class="nav-link" href="ai_fin_profile.html">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="ai_fin_report.html">Financial Report</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5 mb-5" style="max-width: 600px;">
    
    <div class="custom-card p-4 mb-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <span class="text-muted fw-bold">김싸피님의 총 자산</span>
        <button class="btn btn-sm action-btn py-1 px-3 small">분석 〉</button>
      </div>
      <div class="d-flex align-items-baseline mb-4">
        <div class="fs-1 fw-bolder me-1">10,000,000</div>
        <span class="fs-4 fw-bold text-muted">원</span>
      </div>
      
      <div class="d-flex justify-content-between gap-2">
        <button class="btn btn-toss flex-fill py-3 fw-bold fs-5" data-bs-toggle="modal" data-bs-target="#transferModal">송금</button>
        <button class="btn action-btn flex-fill py-3 fs-6">결제</button>
        <button class="btn action-btn flex-fill py-3 fs-6">채우기</button>
      </div>
    </div>

    <div class="custom-card p-4 mb-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="fw-bolder mb-0">계좌</h5>
        <span class="text-primary fw-bold" style="cursor: pointer; color: var(--toss-blue) !important;">+ 추가</span>
      </div>

      <div class="account-list">
        <div class="account-item d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center">
            <div class="icon-box me-3 bg-primary bg-opacity-10">🏦</div>
            <div>
              <div class="text-muted small">SSAFY 뱅크</div>
              <div class="fw-bold fs-6">급여 통장</div>
            </div>
          </div>
          <div class="fw-bold fs-5">7,500,000 원</div>
        </div>

        <div class="account-item d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center">
            <div class="icon-box me-3 bg-warning bg-opacity-10">🐶</div>
            <div>
              <div class="text-muted small">카카오뱅크</div>
              <div class="fw-bold fs-6">루피 전용 적금</div>
            </div>
          </div>
          <div class="fw-bold fs-5">1,200,000 원</div>
        </div>

        <div class="account-item d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center">
            <div class="icon-box me-3 bg-success bg-opacity-10">⚽</div>
            <div>
              <div class="text-muted small">토스뱅크</div>
              <div class="fw-bold fs-6">주말 풋살 모임 회비</div>
            </div>
          </div>
          <div class="fw-bold fs-5">1,300,000 원</div>
        </div>
      </div>
    </div>

    <div class="custom-card p-4 text-center d-flex flex-column justify-content-center align-items-center" 
         style="cursor: pointer; background: linear-gradient(135deg, var(--toss-core-blue), var(--toss-blue));" 
         onclick="location.href='ai_fin_portfolio.html';">
      <div class="fs-5 fw-bold mb-1 text-white">나에게 딱 맞는 투자 종목은?</div>
      <div class="small text-white opacity-75 mb-3">포트폴리오 설정하고 추천받기</div>
      <button class="btn btn-light fw-bold px-4 rounded-pill" style="color: var(--toss-core-blue);">투자 성향 알아보기</button>
    </div>

  </div>

  <div class="modal fade" id="transferModal" tabindex="-1" aria-labelledby="transferModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content custom-card p-2">
        <div class="modal-header border-0 pb-0">
          <h1 class="modal-title fs-5 fw-bold" id="transferModalLabel">어디로 돈을 보낼까요?</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="input-group mb-4 mt-2">
            <span class="input-group-text border-0 bg-transparent fs-4 fw-bold">₩</span>
            <input type="number" class="form-control border-0 bg-light rounded-3 fs-4 fw-bold p-3" placeholder="보낼 금액 입력">
          </div>
          <div class="text-muted small fw-bold mb-3">최근 이체 내역</div>
          
          <div class="account-item d-flex justify-content-between align-items-center p-2">
            <div class="d-flex align-items-center">
              <div class="icon-box me-3 rounded-circle text-white fw-bold" style="background-color: #9e9e9e;">강</div>
              <div>
                <div class="fw-bold text-dark">강정민</div>
                <div class="text-muted small">국민 110-***-1234</div>
              </div>
            </div>
          </div>

          <div class="account-item d-flex justify-content-between align-items-center p-2">
            <div class="d-flex align-items-center">
              <div class="icon-box me-3 rounded-circle text-white fw-bold" style="background-color: #ff9800;">건</div>
              <div>
                <div class="fw-bold text-dark">건물주 (월세)</div>
                <div class="text-muted small">신한 110-***-5678</div>
              </div>
            </div>
          </div>

        </div>
        <div class="modal-footer border-0 pt-0">
          <button type="button" class="btn btn-toss w-100 py-3 fs-5 fw-bold" data-bs-dismiss="modal">다음</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
