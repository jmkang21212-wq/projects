<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SSAFY Bank - Financial Report</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-dark navbar-expand-lg bg-toss px-4 shadow-sm">
    <div class="container-fluid max-w-75">
      <a class="navbar-brand fw-bold" href="ai_index.html">SSAFY Bank</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="ai_index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="ai_fin_portfolio.html">Portfolio</a></li>
          <li class="nav-item"><a class="nav-link" href="ai_fin_profile.html">Profile</a></li>
          <li class="nav-item"><a class="nav-link active fw-bold" href="ai_fin_report.html">Financial Report</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5" style="max-width: 800px;">
    
    <div class="custom-card p-4 mb-4 d-flex justify-content-between align-items-center">
      <div>
        <div class="text-muted small mb-1">이번 달 총 수익</div>
        <div class="fs-3 fw-bolder text-stock-up">+ 1,250,000 원</div>
      </div>
      <div class="text-end">
        <div class="text-muted small mb-1">총 자산 대비</div>
        <div class="fs-5 fw-bold">+ 2.4%</div>
      </div>
    </div>

    <div class="row g-4 mb-5">
      <div class="col-md-7">
        <div class="custom-card p-4 h-100">
          <h5 class="fw-bolder mb-4">최근 6개월 자산 추이</h5>
          <div style="position: relative; height: 250px; width: 100%;">
            <canvas id="assetLineChart"></canvas>
          </div>
        </div>
      </div>

      <div class="col-md-5">
        <div class="custom-card p-4 h-100">
          <h5 class="fw-bolder mb-4">최근 거래 내역</h5>
          
          <div class="transaction-list">
            <div class="transaction-item d-flex justify-content-between align-items-center">
              <div class="d-flex align-items-center">
                <div class="icon-box me-3">📈</div>
                <div>
                  <div class="fw-bold text-dark">삼성전자 매수</div>
                  <div class="text-muted small">오늘 10:30</div>
                </div>
              </div>
              <div class="fw-bold text-primary">- 73,000 원</div>
            </div>
            
            <div class="transaction-item d-flex justify-content-between align-items-center">
              <div class="d-flex align-items-center">
                <div class="icon-box me-3">💰</div>
                <div>
                  <div class="fw-bold text-dark">월급 입금</div>
                  <div class="text-muted small">어제 09:00</div>
                </div>
              </div>
              <div class="fw-bold text-stock-up">+ 3,500,000 원</div>
            </div>

            <div class="transaction-item d-flex justify-content-between align-items-center">
              <div class="d-flex align-items-center">
                <div class="icon-box me-3">☕</div>
                <div>
                  <div class="fw-bold text-dark">스타벅스</div>
                  <div class="text-muted small">3일 전</div>
                </div>
              </div>
              <div class="fw-bold text-dark">- 4,500 원</div>
            </div>
          </div>
          <button class="btn btn-light w-100 mt-3 text-muted fw-bold">내역 더보기</button>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
  <script>
    // Chart.js 선 그래프(Line Chart) 그리기
    const ctxLine = document.getElementById('assetLineChart').getContext('2d');
    
    // 그라데이션 효과 채우기 (선택사항, 디자인을 위해 추가)
    let gradient = ctxLine.createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, 'rgba(49, 130, 246, 0.3)'); // 토스 블루 투명하게
    gradient.addColorStop(1, 'rgba(49, 130, 246, 0)');

    new Chart(ctxLine, {
      type: 'line',
      data: {
        labels: ['10월', '11월', '12월', '1월', '2월', '3월'],
        datasets: [{
          label: '총 자산 (만원)',
          data: [850, 880, 870, 920, 950, 1000],
          borderColor: '#3182f6', // 선 색상
          backgroundColor: gradient, // 배경 그라데이션
          borderWidth: 3,
          pointBackgroundColor: '#ffffff',
          pointBorderColor: '#3182f6',
          pointBorderWidth: 2,
          pointRadius: 4,
          fill: true, // 선 아래 영역 칠하기
          tension: 0.4 // 선을 부드러운 곡선으로
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false } // 범례 숨기기 (더 깔끔하게)
        },
        scales: {
          x: { grid: { display: false } }, // 세로선 숨기기
          y: { grid: { borderDash: [5, 5] }, beginAtZero: false } // 가로선 점선 처리
        }
      }
    });
  </script>
</body>
</html>
