<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    body {
      font-family: 'Pretendard';
    }

    .Profile {
      height: 430px
    }

    .Information {
      height: 550px
    }

    img {
      width: 200px;
      height: 200px;
      object-fit: contain;
      object-position: center center;
    }
  </style>
</head>

<body>
  <!-- 네이게이션 바 -->
  <nav class="navbar navbar-dark navbar-expand-lg bg-primary px-4">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">SSAFY Bank</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="#">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="fin_portfolio.html">Portfolio</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="#">Profile</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Financial Report</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
  <!-- 프로필 및 투자 성향 출력 -->
  <div class="container">
    <div class="container w-100 border m-4 p-3 rounded-3 shadow-sm text-center">
      <h5 class="fw-bold">기본 정보 수정</h5>

      <div class="row">
        <div class="col-12 col-md-6">
          <p class="fw-bold">프로필 사진</p>
          <img class="rounded-circle shadow-sm" src="kakako-00.jpg">
          <p class="fw-bold mt-3">자기 소개</p>
          <div class="input-group">
            <span class="input-group-text">자기 소개</span>
            <textarea class="form-control" placeholder="안녕하세요 부자입니다." aria-label="With textarea"></textarea>
            <button class="btn btn-info text-white p-1 flex-shrink-1" type="button" id="button-addon2">Update</button>
          </div>
        </div>
        <div class="col-12 col-md-6 d-flex flex-column justify-content-between">
          <div class="fw-bold mb-2">투자상품 선호도</div>
          <div class="d-flex mb-2 justify-content-evenly">
            <div class="form-check mx-2">
              <input class="form-check-input" type="checkbox" value="" id="checkDefault">
              <label class="form-check-label" for="checkDefault">
                주식
              </label>
            </div>
            <div class="form-check mx-2">
              <input class="form-check-input" type="checkbox" value="" id="checkChecked" checked>
              <label class="form-check-label" for="checkChecked">
                채권
              </label>
            </div>
            <div class="form-check mx-2">
              <input class="form-check-input" type="checkbox" value="" id="checkDefault">
              <label class="form-check-label" for="checkDefault">
                부동산
              </label>
            </div>
            <div class="form-check mx-2">
              <input class="form-check-input" type="checkbox" value="" id="checkChecked" checked>
              <label class="form-check-label" for="checkChecked">
                가상 화폐
              </label>
            </div>
          </div>
          <div class="fw-bold mb-2">투자 스타일</div>
          <div class="d-flex mb-2 justify-content-evenly">
            <div class="form-check mx-2">
              <input class="form-check-input" type="checkbox" value="" id="checkDefault">
              <label class="form-check-label" for="checkDefault">
                안정적
              </label>
            </div>
            <div class="form-check mx-2">
              <input class="form-check-input" type="checkbox" value="" id="checkChecked" checked>
              <label class="form-check-label" for="checkChecked">
                중립적
              </label>
            </div>
            <div class="form-check mx-2">
              <input class="form-check-input" type="checkbox" value="" id="checkDefault">
              <label class="form-check-label" for="checkDefault">
                공격적
              </label>
            </div>
          </div>
          <div class="fw-bold mb-2">관심 종목</div>
          <div class="d-flex mb-4 justify-content-evenly">
            <div class="form-check mx-2">
              <input class="form-check-input" type="checkbox" value="" id="checkDefault">
              <label class="form-check-label" for="checkDefault">
                정보기술
              </label>
            </div>
            <div class="form-check mx-2">
              <input class="form-check-input" type="checkbox" value="" id="checkChecked" checked>
              <label class="form-check-label" for="checkChecked">
                소비재
              </label>
            </div>
            <div class="form-check mx-2">
              <input class="form-check-input" type="checkbox" value="" id="checkDefault">
              <label class="form-check-label" for="checkDefault">
                금융
              </label>
            </div>
            <div class="form-check mx-2">
              <input class="form-check-input" type="checkbox" value="" id="checkChecked" checked>
              <label class="form-check-label" for="checkChecked">
                암호 화폐
              </label>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 수정 페이지 회원 정보 결과 -->

    <div class="Information w-100 border m-4 p-3 rounded-3 shadow-sm">
      <form>
        <div class="mb-3">
          <label for="username" class="form-label">회원 번호</label>
          <div class="card">
            <div class="card-body py-1">
              1
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label for="username" class="form-label">ID</label>
          <div class="card">
            <div class="card-body py-1">
              김싸피
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">Email</label>
          <div class="input-group mb-3">
            <input type="email" class="form-control" placeholder="이메일을 설정해주세요" aria-label="Email"
              aria-describedby="button-addon2">
            <span class="input-group-text text-secondary" id="basic-addon2">@example.com</span>
            <button class="btn btn-info text-white p-1" type="button" id="button-addon2">Update</button>
          </div>
        </div>

        <div class="mb-3">
          <label for="nickname" class="form-label">NickName</label>
          <div class="input-group mb-3">
            <input type="text" class="form-control" placeholder="닉네임을 설정해주세요" aria-label="NickName"
              aria-describedby="button-addon2">
            <button class="btn btn-info text-white p-1" type="button" id="button-addon2">Update</button>
          </div>
        </div>

        <div class="mb-3">
          <label for="age" class="form-label">나이</label>
          <div class="input-group mb-3">
            <input type="number" class="form-control" placeholder="나이를 설정해주세요" aria-label="Age">
            <button class="btn btn-info text-white p-1" type="button" id="button-addon2">Update</button>
          </div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">자산과 연봉</label>
          <div class="input-group mb-3">
            <span class="input-group-text">$</span>
            <input type="number" class="form-control" placeholder="전체 자산을 설정해주세요" aria-label="Assets">
            <span class="input-group-text">$</span>
            <input type="number" class="form-control" placeholder="연봉을 설정해주세요" aria-label="AnnualIncome">
            <button class="btn btn-info text-white p-1" type="button" id="button-addon2">Update</button>
          </div>
        </div>
      </form>
    </div>
  </div>




  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
