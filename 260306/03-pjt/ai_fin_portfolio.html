<!doctype html>
<html lang="ko">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SSAFY Bank - Portfolio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <nav class="navbar navbar-dark navbar-expand-lg bg-toss px-4 shadow-sm">
    <div class="container-fluid max-w-75">
      <a class="navbar-brand fw-bold" href="ai_index.html">SSAFY Bank</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="ai_index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active fw-bold" href="ai_fin_portfolio.html">Portfolio</a></li>
          <li class="nav-item"><a class="nav-link" href="ai_fin_profile.html">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="ai_fin_report.html">Financial Report</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container mt-5" style="max-width: 800px;">
    <div class="alert custom-card p-3 mb-4 d-flex align-items-center" role="alert">
      <div class="fs-3 me-3">💡</div>
      <div>
        <div class="text-muted small">Insight</div>
        <div class="fw-bold mb-0">나와 비슷한 29세 마케터들은 <span class="text-stock-up">소비재</span>와 <span
            class="text-stock-up">정보기술</span> 종목 비중이 가장 높아요!</div>
      </div>
    </div>

    <div class="row g-4 mb-5">
      <div class="col-md-5">
        <div class="custom-card p-4 h-100 text-center">
          <h5 class="fw-bolder mb-1">내 포트폴리오 비중</h5>
          <p class="text-muted small mb-4">총 수익률 <span class="text-stock-up fw-bold">+5.2%</span></p>
          <div style="position: relative; height:200px; width:100%">
            <canvas id="portfolioChart"></canvas>
          </div>
        </div>
      </div>

      <div class="col-md-7">
        <div class="custom-card p-4 h-100">
          <h5 class="fw-bolder mb-4">투자 성향 설정</h5>

          <div class="row g-3 mb-4">
            <div class="col-4">
              <input type="radio" class="btn-check" name="investStyle" id="style1">
              <label class="invest-card-label w-100 p-3 text-center" for="style1">
                <div class="fw-bold mb-1">안정형</div>
                <div class="small text-muted">예적금 위주</div>
              </label>
            </div>
            <div class="col-4">
              <input type="radio" class="btn-check" name="investStyle" id="style2" checked>
              <label class="invest-card-label w-100 p-3 text-center" for="style2">
                <div class="fw-bold mb-1 text-primary">중립적</div>
                <div class="small text-muted">주식+채권 혼합</div>
              </label>
            </div>
            <div class="col-4">
              <input type="radio" class="btn-check" name="investStyle" id="style3">
              <label class="invest-card-label w-100 p-3 text-center" for="style3">
                <div class="fw-bold mb-1">공격적</div>
                <div class="small text-muted">고수익 추구</div>
              </label>
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label text-muted small fw-bold">주 거래 은행 (최애 은행)</label>
            <div class="input-group">
              <input type="text" class="form-control bg-light border-0" value="SSAFY 뱅크">
              <button class="btn btn-primary rounded-end" style="background-color: var(--toss-blue); border:none;"
                type="button">업데이트</button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
  <script>
    // 1. 투자 성향별 데이터 세팅
    const portfolioData = {
      'style1': [10, 60, 0, 30],  // 안정형
      'style2': [45, 25, 15, 15], // 중립적
      'style3': [70, 10, 20, 0]   // 공격적
    };

    // 2. Chart.js 초기화
    const ctx = document.getElementById('portfolioChart').getContext('2d');
    let myPortfolioChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['주식', '채권', '암호화폐', '현금'],
        datasets: [{
          data: portfolioData['style2'], // 일단 중립적(기본값)으로 세팅
          backgroundColor: ['#3182f6', '#f04452', '#ffc107', '#e5e8eb'],
          borderWidth: 0,
          hoverOffset: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, padding: 15, font: { family: 'Pretendard' } } } },
        cutout: '70%'
      }
    });

    // ✨ 3. 화면이 켜질 때: 저장된 데이터 불러오기
    const savedStyle = localStorage.getItem('userInvestStyle'); // 저장된 성향 꺼내기

    if (savedStyle) {
      // 만약 이전에 저장해둔 성향이 있다면?
      document.getElementById(savedStyle).checked = true; // 1) 해당 버튼에 체크 표시
      myPortfolioChart.data.datasets[0].data = portfolioData[savedStyle]; // 2) 차트 데이터 교체
      myPortfolioChart.update(); // 3) 차트 다시 그리기
    }

    // ✨ 4. 버튼을 누를 때: 새로운 데이터 저장하기
    document.querySelectorAll('input[name="investStyle"]').forEach((radio) => {
      radio.addEventListener('change', function () {
        const selectedStyle = this.id;

        // 1) 차트 업데이트
        myPortfolioChart.data.datasets[0].data = portfolioData[selectedStyle];
        myPortfolioChart.update();

        // 2) 브라우저 로컬 스토리지에 방금 누른 버튼의 id(style1, style2 등)를 저장!
        localStorage.setItem('userInvestStyle', selectedStyle);
      });
    });
  </script>
</body>

</html>
